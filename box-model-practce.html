<DOCTYPE  html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"content="width=device-width,initial-scale=1.0">
<title>Box Model Practice</title>

<style>

*{
    margin: o;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: Arial,sans-serif;
    padding: 20px;
}

.container{
    display: flex;
    gap: 20px;
    margin-bottom: 40px;

}

.box{
    width: 300px;
    padding: 20px;
    border: 5px solid black;
    margin: 10px;
    background-color: lightblue;
}

.content-box{
    background-color: lightgreen;
}

.padding-box{
    background-color: lightcoral;
}

.border-box{
    background-color: lightyellow;
    border: 5px dashed red;
}

.margin-box{
    background-color: lightgray;
    margin: 30px;
}

.card{
    width: 300px;
    border: 1px solid gray;
    padding: 20px;
    border-radius: 8px;
    background: #fff;
}

.card img{
    width: 100%;
    display: block;
    margin-bottom: 15px;
}

.card h3{
    margin-bottom: 15px;
}

.card p{
    margin-bottom:n 20px;
}

.card button{ 
    width: 100%;
    padding: 10px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}

.card button:hover{
    background: #333;
}

</style>
</head>

<body>

<h1>Box Model Visualization</h1>

<div class="container">
    <div class="box content-box">Content</div>
    <div class="box padding-box">Padding</div>
    <div class="box border-box">Border</div>
    <div class="box margin-box">Margin</div>
</div>

<h1>Card Compenent</h1>

<div class="card"><img src="https://via.placeholder.com/300*150" alt="Card Image">
    <h3>Card Title</h3>
    <p>This is a simple description inside the card component.</p>
    <button>Click Me</button>
</div>

</body>
</html>
